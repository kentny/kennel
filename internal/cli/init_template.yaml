# Kennel project configuration
# Generated by `kennel init` on {{.Date}}.
# Docs: https://github.com/kentny/kennel
#
# kennel discovers this file by walking up from the current working directory,
# the same way git locates .git/ — keep it at your repository root.

version: 1

project:
  name: {{.ProjectName}}

default_agent: {{.DefaultAgent}}

worktree:
  parent: "../{project}-wt"

sandbox:
  template_name: "{project}-{agent}-sandbox"
  name_prefix: "{agent}-{project}"

{{ if eq .Policy "allow" -}}
# Network policy: `allow` — sandbox has full outbound network access.
# This is the convenient-but-risky choice. If you later tighten this,
# switch `network.default_policy` to `deny` and populate `allow_hosts`.
network:
  default_policy: allow
  allow_hosts: []
  allow_cidrs: []
{{- else -}}
# Network policy: `deny` — sandbox traffic is blocked unless the destination
# matches one of the allow-list entries below. Edit the list and re-run
# `kennel network apply` to push changes into a running sandbox.
network:
  default_policy: deny
  allow_hosts:
{{- if .AllowHosts }}
{{- range .AllowHosts }}
    - "{{ . }}"
{{- end }}
{{- else }} []
{{- end }}
  allow_cidrs:
    - 172.16.0.0/12
{{- end }}

agents:
  claude:
    # Override base_image only if you need a template other than the shipped
    # docker/sandbox-templates:claude-code.
    # base_image: docker/sandbox-templates:claude-code
    plugins:
{{- if and (eq .DefaultAgent "claude") .ClaudePlugins }}
      enabled: true
      repos:
{{- /* url / path are quoted to stop a malicious marketplace json
       containing commas / braces / newlines from rewriting the generated
       YAML into attacker-controlled shape. Discovery is also strict. */}}
{{- range .ClaudePlugins }}
        - { url: "{{ .URL }}", path: "{{ .Name }}" }
{{- end }}
{{- else }}
      enabled: false
      repos: []
{{- end }}
    allow_hosts: []

  codex:
    # base_image: docker/sandbox-templates:codex-universal
    plugins:
      enabled: false
      repos: []
    allow_hosts: []

# Extra apt packages installed during `kennel build`. Leave empty if not needed.
apt_packages: []

# Environment variables exported by the sandbox persistent init script.
env: {}

# Extra shell lines appended verbatim to the persistent init script.
# Use for runtime exports or sourcing init files (nvm.sh, sdkman-init.sh).
# Do NOT add shell completion scripts — they break the Claude Code bash tool.
init_script: |
  # Docker gateway for Docker-in-Docker / host service access.
  export no_proxy="${no_proxy},172.17.0.1"

# Escape hatch for projects that need Dockerfile edits the declarative fields
# above cannot express. Path is resolved relative to this file; contents are
# appended to the generated Dockerfile as root, before the final USER switch.
# dockerfile_extra: .kennel/Dockerfile.extra
{{- if .CodexSkillsNote }}

# ---------------------------------------------------------------------
# Codex skills detected under ~/.codex/skills/ on the host.
# Codex has no marketplace/registry, so these are NOT auto-mounted.
# To include them in the sandbox, either:
#   (a) copy them into your repo and mount via the normal workspace,
#   (b) add a 'dockerfile_extra' snippet that COPYs them in.
#
{{- range .CodexSkills }}
#   - {{ .Name }}  ({{ .Path }})
{{- end }}
# ---------------------------------------------------------------------
{{- end }}
